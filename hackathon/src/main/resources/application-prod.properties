# Production profile — active when SPRING_PROFILES_ACTIVE=prod (set in Railway)

# PostgreSQL — Railway injects DATABASE_URL automatically
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 console off in prod
spring.h2.console.enabled=false

# LLM
llm.api.key=${LLM_API_KEY}
llm.provider=${LLM_PROVIDER:groq}
llm.model=${LLM_MODEL:llama-3.3-70b-versatile}
llm.endpoint=${AI_BASE_URL:https://api.groq.com/openai/v1/chat/completions}

# CORS — frontend URLs
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}
