spring.application.name=hackathon

# H2
spring.datasource.url=jdbc:h2:mem:hackathon
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

# LLM — set LLM_API_KEY env var, never commit value
llm.provider=${LLM_PROVIDER:groq}
llm.api-key=${LLM_API_KEY:demo-key}
llm.model=${LLM_MODEL:llama-3.3-70b-versatile}
llm.base-url=${AI_BASE_URL:https://api.groq.com}

# Routing strategy — switchable at runtime via env var, no restart needed
# Values: ai | rule-based
routing.strategy=${ROUTING_STRATEGY:ai}
